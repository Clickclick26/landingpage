<html lang="en">
<head>

    <title>Click Click | Video Marketing Agency</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #FDF5E6;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-wrap {
            position: fixed;
            top: 24px;
            left: 28px;
            z-index: 10;
        }

        .logo {
            width: 70px;
            display: block;
        }

        .container {
            max-width: 560px;
            padding: 20px 40px;
            text-align: center;
            position: relative;
            z-index: 10;
            margin-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        h1 {
            font-weight: 600;
            letter-spacing: -1px;
            font-size: 2.2rem;
            margin-bottom: 6px;
            margin-top: 0;
        }

        .accent-bar {
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #00bcd4, #e83e8c);
            margin: 10px auto;
        }

        p {
            font-weight: 300;
            color: #555;
            font-size: 1rem;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .contact {
            font-weight: 300;
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin-top: 12px;
        }

        .contact a { color: #00bcd4; text-decoration: none; }
        .contact a:hover { color: #e83e8c; }

        .road {
            position: fixed;
            bottom: 18px;
            left: 0;
            width: 100%;
            height: 1.5px;
            background: linear-gradient(to right, #00bcd4, #e83e8c, #00bcd4);
            opacity: 0.55;
            z-index: 5;
        }

        .truck-wrap {
            position: fixed;
            bottom: 18px;
            left: -220px;
            z-index: 4;
            animation: drive 12s linear infinite;
            filter: drop-shadow(0 2px 6px rgba(0,188,212,0.15));
        }

        @keyframes drive {
            0%   { left: -220px; transform: scaleX(1); }
            44%  { left: calc(100vw + 30px); transform: scaleX(1); }
            45%  { left: calc(100vw + 30px); transform: scaleX(-1); }
            94%  { left: -220px; transform: scaleX(-1); }
            95%  { left: -220px; transform: scaleX(1); }
            100% { left: -220px; transform: scaleX(1); }
        }

        .truck-svg {
            animation: bounce 0.35s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to   { transform: translateY(-2px); }
        }

        .crane-arm {
            transform-origin: 116px 30px;
            animation: swing 5s ease-in-out infinite alternate;
        }

        @keyframes swing {
            from { transform: rotate(-3deg); }
            to   { transform: rotate(3deg); }
        }
    </style>
</head>
<body>

<div class="logo-wrap">

</div>

<div class="container">
    <h1>CLICK CLICK</h1>
    <div class="accent-bar"></div>
    <p>Premium Video Marketing for Growth-Focused Brands.</p>
    <div class="contact">
        Need a fix? <a href="mailto:ops@yourdomain.com">Email Operations</a>
    </div>
</div>

  <circle cx="72"  cy="58" r="11" fill="url(#fillW)" stroke="url(#lg)" stroke-width="1.8"/>
  <circle cx="166" cy="58" r="11" fill="url(#fillW)" stroke="url(#lg)" stroke-width="1.8"/>
</svg>
</div>

</body>
</html>
