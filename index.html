<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Click | Video Marketing Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FDF5E6; /* Professional Cream */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #1a1a1a;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }
        .logo {
            width: 250px;
            /* This removes the white background from your logo file */
            mix-blend-mode: multiply; 
            margin-bottom: 30px;
        }
        h1 {
            font-weight: 600;
            letter-spacing: -1px;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .accent-bar {
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #00bcd4, #e83e8c); /* Turquoise to Pink */
            margin: 20px auto;
        }
        p {
            font-weight: 300;
            color: #555;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Final.Logo-01-01-1080x1080.png" class="logo" alt="Click Click">
        <div class="accent-bar"></div>
        <h1>Coming Soon</h1>
        <p>Our website is currently being refreshed.
Our operations continue smoothly as usual while we support our clients.</p>
    </div>
</body>
</html>
